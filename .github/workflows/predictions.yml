name: worldcup-predictions
on:
  schedule:
    # 08:00 UTC — after the live-sync window fully closes (~07:15), so the
    # latest-finishing match (04:00 UTC group kickoff) is synced to FT before
    # the ratings/Monte-Carlo run reads results.
    - cron: '0 8 * 6,7 *'
  workflow_dispatch: {}

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Update ratings + predictions
        run: python update-predictions.py
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_SYNC_URL }}
